function setPurpose(btn, val) {
    btn.closest('div').querySelectorAll('.purpose-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    guardian.purpose = val;
}
function setGender(btn, val) {
    document.getElementById('btn-male').classList.remove('active');
    document.getElementById('btn-female').classList.remove('active');
    btn.classList.add('active');
    guardian.gender = val;
}
function setNeutered(btn, val) {
    btn.closest('div').querySelectorAll('.purpose-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    guardian.neutered = val;
}

function startTest() {
    const name = document.getElementById('inp-name').value.trim();
    const phone = document.getElementById('inp-phone').value.trim();
    const dog = document.getElementById('inp-dog').value.trim();
    const privacy = document.getElementById('chk-privacy').checked;
    if(!name) { alert('보호자 성함을 입력해주세요.'); return; }
    if(!phone) { alert('연락처를 입력해주세요.'); return; }
    if(!dog) { alert('강아지 이름을 입력해주세요.'); return; }
    if(!guardian.purpose) { alert('상담 목적을 선택해주세요.'); return; }
    if(!privacy) { alert('개인정보 수집·이용 동의가 필요합니다.'); return; }
    guardian.name = name;
    guardian.phone = phone;
    guardian.dogName = dog;
    guardian.breed = document.getElementById('inp-breed').value.trim() || '미입력';
    guardian.age = document.getElementById('inp-age').value.trim() || '미입력';
    guardian.weight = document.getElementById('inp-weight').value.trim() || '미입력';
    if(!guardian.gender) guardian.gender = '미입력';
    if(!guardian.neutered) guardian.neutered = '미입력';
    step = 'test'; qi = 0; answers = [];
    render();
    window.scrollTo({top:0,behavior:'smooth'});
}

function pick(s) {
    answers.push({t:questions[qi].type, s});
    if(qi<questions.length-1){ qi++; render(); window.scrollTo({top:0,behavior:'smooth'}); }
    else { step='results'; render(); }
}

function goBack() { if(qi>0){ qi--; answers.pop(); render(); } }

    answers.forEach(a=>scores[a.t]+=a.s);
    const sorted = Object.entries(scores)
        .map(([k, v]) => ({ id: +k, s: v }))
        .sort((a, b) => {
            if (b.s !== a.s) return b.s - a.s;
            // 타이 브레이킹: 평균 점수 2점 이하(소극/신중)면 7, 8번 유형 우선
            const avg = a.s / 8;
            if (avg <= 2) return b.id - a.id;
            return a.id - b.id;

    const pId = sorted[0].id, sId = sorted[1].id;

function shareResult() {
    if(navigator.share) {
        navigator.share({ title:`🐾 ${guardian.dogName} 독BTI 결과`, text: window._shareText })
        .catch(()=> copyResult());
    } else {
        copyResult();

}

function copyResult() {
    if(navigator.clipboard) {
        navigator.clipboard.writeText(window._shareText).then(()=>{
            alert('✅ 결과가 복사되었습니다!\n카카오톡을 열고 훈련사 채팅창에 붙여넣기(길게 누르기)해 주세요 😊');
        });
    } else {
        const ta = document.createElement('textarea');
        ta.value = window._shareText;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert('✅ 결과가 복사되었습니다!\n카카오톡 훈련사 채팅창에 붙여넣기 해주세요 😊');
    }
}

render();
</script>
</body>
</html>
